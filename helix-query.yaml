# Site page index for /query-index.json (used by the search block).
# Push to AEM Config Service for production:
#   POST https://admin.hlx.page/config/ynaka-adobe/sites/americastire/content/query.yaml
# Local dev: `aem up --print-index` reads this file.
version: 1
indices:
  pages:
    include:
      /**
    exclude:
      - /fragments/**
      - /nav
      - /footer
      - /placeholders.json
      - /**.json
      - /**.plain.html
      - /modals/**
    target: /query-index.json
    properties:
      lastModified:
        select: none
        value: parsed-last-modified
      title:
        select: head > title
      image:
        select: main picture img[src], head meta[property="og:image"]
        attribute: src
      description:
        select: head > meta[name="description"]
        attribute: content
      robots:
        select: head > meta[name="robots"]
        attribute: content
